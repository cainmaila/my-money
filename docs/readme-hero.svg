<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img"
    aria-labelledby="title desc">
    <title id="title">我的錢包宣傳圖</title>
    <desc id="desc">展示我的錢包的每日預算、錢包餘額、信用卡月結與離線可用特色。</desc>
    <defs>
        <linearGradient id="bg" x1="80" y1="40" x2="1090" y2="680" gradientUnits="userSpaceOnUse">
            <stop stop-color="#EEF2FF" />
            <stop offset="0.55" stop-color="#E6F7F2" />
            <stop offset="1" stop-color="#FFF2E8" />
        </linearGradient>
        <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
            <stop stop-color="#4F46E5" />
            <stop offset="1" stop-color="#7C3AED" />
        </linearGradient>
        <linearGradient id="progress" x1="0" y1="0" x2="1" y2="0">
            <stop stop-color="#14B8A6" />
            <stop offset="1" stop-color="#4F46E5" />
        </linearGradient>
        <filter id="shadow" x="0" y="0" width="1200" height="720" filterUnits="userSpaceOnUse"
            color-interpolation-filters="sRGB">
            <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#312E81" flood-opacity="0.12" />
        </filter>
    </defs>

    <rect width="1200" height="720" rx="40" fill="url(#bg)" />
    <circle cx="1048" cy="112" r="138" fill="#4F46E5" fill-opacity="0.08" />
    <circle cx="164" cy="604" r="124" fill="#0F766E" fill-opacity="0.08" />

    <g filter="url(#shadow)">
        <rect x="610" y="86" width="500" height="548" rx="32" fill="#F8FAFC" />
    </g>

    <rect x="650" y="136" width="420" height="164" rx="28" fill="url(#panel)" />
    <text x="682" y="178" fill="#C7D2FE" font-family="Arial, sans-serif" font-size="24" font-weight="700">今日可花</text>
    <text x="682" y="236" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="60" font-weight="800">$1,280</text>
    <text x="682" y="272" fill="#E0E7FF" font-family="Arial, sans-serif" font-size="22" font-weight="600">今天還能花
        $830</text>
    <rect x="682" y="292" width="260" height="12" rx="6" fill="#FFFFFF" fill-opacity="0.22" />
    <rect x="682" y="292" width="168" height="12" rx="6" fill="#FFFFFF" />
    <rect x="954" y="274" width="88" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.18" />
    <text x="976" y="297" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="700">剩 18 天</text>

    <rect x="650" y="332" width="198" height="116" rx="24" fill="#FFFFFF" />
    <text x="676" y="372" fill="#64748B" font-family="Arial, sans-serif" font-size="22" font-weight="700">錢包餘額</text>
    <text x="676" y="424" fill="#0F766E" font-family="Arial, sans-serif" font-size="42" font-weight="800">$23,640</text>

    <rect x="870" y="332" width="200" height="116" rx="24" fill="#FFFFFF" />
    <text x="896" y="372" fill="#64748B" font-family="Arial, sans-serif" font-size="22" font-weight="700">今天已花</text>
    <text x="896" y="424" fill="#E5614C" font-family="Arial, sans-serif" font-size="42" font-weight="800">$450</text>

    <rect x="650" y="472" width="420" height="126" rx="28" fill="#FFFFFF" />
    <text x="682" y="514" fill="#1E293B" font-family="Arial, sans-serif" font-size="24" font-weight="800">本月信用卡應付</text>
    <text x="682" y="552" fill="#64748B" font-family="Arial, sans-serif" font-size="20" font-weight="700">CTBC</text>
    <rect x="762" y="536" width="182" height="10" rx="5" fill="#E2E8F0" />
    <rect x="762" y="536" width="122" height="10" rx="5" fill="url(#progress)" />
    <text x="958" y="552" fill="#334155" font-family="Arial, sans-serif" font-size="20" font-weight="800">$5,220</text>
    <text x="682" y="584" fill="#64748B" font-family="Arial, sans-serif" font-size="20" font-weight="700">DBS</text>
    <rect x="762" y="568" width="182" height="10" rx="5" fill="#E2E8F0" />
    <rect x="762" y="568" width="84" height="10" rx="5" fill="#14B8A6" />
    <text x="958" y="584" fill="#334155" font-family="Arial, sans-serif" font-size="20" font-weight="800">$2,180</text>

    <g>
        <text x="88" y="154" fill="#1E2030" font-family="Arial, sans-serif" font-size="28" font-weight="700">PWA
            記帳工具</text>
        <text x="88" y="232" fill="#1E2030" font-family="Arial, sans-serif" font-size="76" font-weight="800">我的錢包</text>
        <text x="88" y="284" fill="#4B5563" font-family="Arial, sans-serif" font-size="30"
            font-weight="600">把今日預算、現金餘額與卡費月結濃縮在同一個畫面。</text>
        <text x="88" y="324" fill="#4B5563" font-family="Arial, sans-serif" font-size="30"
            font-weight="600">免登入、可離線、開站即可記。</text>
    </g>

    <g>
        <rect x="88" y="384" width="198" height="62" rx="31" fill="#FFFFFF" />
        <circle cx="124" cy="415" r="16" fill="#4F46E5" fill-opacity="0.12" />
        <path d="M117 416L122 421L131 410" stroke="#4F46E5" stroke-width="4" stroke-linecap="round"
            stroke-linejoin="round" />
        <text x="152" y="422" fill="#1E2030" font-family="Arial, sans-serif" font-size="24" font-weight="700">零註冊</text>

        <rect x="302" y="384" width="230" height="62" rx="31" fill="#FFFFFF" />
        <circle cx="338" cy="415" r="16" fill="#0F766E" fill-opacity="0.12" />
        <path d="M330 421H346M338 407V423" stroke="#0F766E" stroke-width="4" stroke-linecap="round" />
        <text x="366" y="422" fill="#1E2030" font-family="Arial, sans-serif" font-size="24" font-weight="700">IndexedDB
            儲存</text>

        <rect x="88" y="464" width="228" height="62" rx="31" fill="#FFFFFF" />
        <circle cx="124" cy="495" r="16" fill="#F97316" fill-opacity="0.14" />
        <path d="M124 485V495L131 500" stroke="#F97316" stroke-width="4" stroke-linecap="round"
            stroke-linejoin="round" />
        <text x="152" y="502" fill="#1E2030" font-family="Arial, sans-serif" font-size="24"
            font-weight="700">每日預算倒推</text>

        <rect x="332" y="464" width="178" height="62" rx="31" fill="#FFFFFF" />
        <circle cx="368" cy="495" r="16" fill="#DC2626" fill-opacity="0.12" />
        <path d="M360 492H376M360 500H372" stroke="#DC2626" stroke-width="4" stroke-linecap="round" />
        <text x="396" y="502" fill="#1E2030" font-family="Arial, sans-serif" font-size="24"
            font-weight="700">卡費彙總</text>
    </g>

    <rect x="88" y="566" width="360" height="72" rx="36" fill="#1E2030" />
    <text x="128" y="612" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="30" font-weight="800">GitHub Pages
        線上版</text>
</svg>